<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WW III</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #1a1612; color: #c4a882; font-family: 'Rajdhani', sans-serif;
  overflow: hidden; width: 100vw; height: 100vh; cursor: crosshair;
}
canvas { display: block; }

/* SCREENS */
.screen { position: fixed; inset: 0; display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
.screen.active { display: flex; }
.screen-bg { position: absolute; inset: 0; background: linear-gradient(180deg, #0d0a07 0%, #1a1612 40%, #2a1f15 100%); }
.screen-content { position: relative; z-index: 1; text-align: center; width: 90%; max-width: 500px; }

/* TITLE */
.title { font-family: 'Share Tech Mono', monospace; font-size: clamp(3rem, 10vw, 6rem); color: #d4a054; text-shadow: 0 0 30px rgba(212,160,84,0.4), 0 4px 8px rgba(0,0,0,0.8); letter-spacing: 0.3em; margin-bottom: 0.2em; }
.subtitle { font-size: clamp(0.8rem, 2.5vw, 1.1rem); color: #8a7560; letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 2em; }

/* BUTTONS */
.btn { 
  display: block; width: 100%; padding: 14px 24px; margin: 8px 0; background: rgba(212,160,84,0.08);
  border: 1px solid rgba(212,160,84,0.25); color: #d4a054; font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.btn:hover, .btn:active { background: rgba(212,160,84,0.18); border-color: rgba(212,160,84,0.5); transform: scale(1.02); }
.btn.small { width: auto; display: inline-block; padding: 10px 20px; font-size: 0.9rem; }
.btn.selected { background: rgba(212,160,84,0.25); border-color: #d4a054; box-shadow: 0 0 15px rgba(212,160,84,0.2); }

.section-title { font-size: 1.3rem; color: #d4a054; letter-spacing: 0.2em; margin: 1.5em 0 0.5em; text-transform: uppercase; }
.desc { color: #8a7560; font-size: 0.85rem; margin-bottom: 1em; }

/* CHARACTER CREATOR */
.char-preview { width: 120px; height: 120px; margin: 0 auto 1em; border: 2px solid rgba(212,160,84,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: rgba(212,160,84,0.05); }
.color-options { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
.color-opt { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
.color-opt:hover, .color-opt.selected { border-color: #d4a054; transform: scale(1.15); }

/* LEVEL SELECT */
.levels-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 1em 0; max-height: 300px; overflow-y: auto; }
.level-card { padding: 12px 8px; background: rgba(212,160,84,0.05); border: 1px solid rgba(212,160,84,0.15); cursor: pointer; transition: all 0.2s; }
.level-card:hover { background: rgba(212,160,84,0.12); }
.level-card.locked { opacity: 0.3; cursor: not-allowed; }
.level-card .lnum { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; color: #d4a054; }
.level-card .lname { font-size: 0.65rem; color: #8a7560; text-transform: uppercase; letter-spacing: 0.1em; }
.diff-options { display: flex; gap: 8px; justify-content: center; margin: 1em 0; }

/* CUTSCENE */
.cutscene-panel { background: rgba(0,0,0,0.85); border: 1px solid rgba(212,160,84,0.2); padding: 2em; margin: 1em 0; }
.cutscene-text { font-size: 1rem; line-height: 1.8; color: #c4a882; min-height: 100px; }
.cutscene-speaker { font-family: 'Share Tech Mono', monospace; color: #d4a054; font-size: 0.9rem; margin-bottom: 0.5em; }

/* HUD */
#hud { position: fixed; inset: 0; z-index: 50; pointer-events: none; display: none; }
#hud.active { display: block; }
.hud-top { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
.hud-bottom { position: absolute; bottom: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-end; }

.health-bar { width: 180px; }
.bar-label { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: #8a7560; letter-spacing: 0.2em; }
.bar-outer { height: 8px; background: rgba(0,0,0,0.6); border: 1px solid rgba(212,160,84,0.3); margin-top: 2px; }
.bar-inner { height: 100%; background: linear-gradient(90deg, #8b3a3a, #c45c5c); transition: width 0.3s; }
.bar-inner.health { background: linear-gradient(90deg, #3a8b4a, #5cc46c); }

.ammo-display { font-family: 'Share Tech Mono', monospace; text-align: right; }
.ammo-count { font-size: 1.8rem; color: #d4a054; line-height: 1; }
.ammo-label { font-size: 0.6rem; color: #8a7560; letter-spacing: 0.2em; }

.minimap { width: 100px; height: 100px; background: rgba(0,0,0,0.6); border: 1px solid rgba(212,160,84,0.3); position: relative; overflow: hidden; }
.minimap-dot { position: absolute; width: 4px; height: 4px; border-radius: 50%; }
.minimap-dot.player { background: #5cc46c; }
.minimap-dot.enemy { background: #c45c5c; }
.minimap-dot.item { background: #d4a054; }

.inventory-bar { display: flex; gap: 4px; }
.inv-slot { width: 40px; height: 40px; background: rgba(0,0,0,0.5); border: 1px solid rgba(212,160,84,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.inv-slot.active { border-color: #d4a054; background: rgba(212,160,84,0.15); }

.score-display { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: #d4a054; }
.level-display { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: #8a7560; }

.crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
.crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(212,160,84,0.6); }
.crosshair::before { width: 16px; height: 2px; top: -1px; left: -8px; }
.crosshair::after { width: 2px; height: 16px; left: -1px; top: -8px; }

.damage-flash { position: fixed; inset: 0; background: rgba(180,40,40,0.3); pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 45; }

/* TOUCH CONTROLS */
.touch-controls { position: fixed; bottom: 20px; z-index: 55; display: none; pointer-events: auto; }
.touch-controls.active { display: flex; }
.joystick-area { position: fixed; bottom: 20px; left: 20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(212,160,84,0.1); border: 2px solid rgba(212,160,84,0.2); pointer-events: auto; z-index: 55; display: none; }
.joystick-area.active { display: block; }
.joystick-knob { width: 40px; height: 40px; border-radius: 50%; background: rgba(212,160,84,0.3); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
.touch-btn { position: fixed; z-index: 55; pointer-events: auto; display: none; width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(212,160,84,0.3); background: rgba(212,160,84,0.1); font-family: 'Rajdhani', sans-serif; color: #d4a054; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
.touch-btn.active { display: flex; align-items: center; justify-content: center; }
#btn-attack { bottom: 30px; right: 30px; width: 70px; height: 70px; background: rgba(180,60,60,0.2); border-color: rgba(180,60,60,0.4); }
#btn-block { bottom: 110px; right: 30px; }
#btn-dodge { bottom: 30px; right: 110px; }
#btn-ranged { bottom: 110px; right: 110px; }
#btn-weapon { bottom: 70px; right: 185px; font-size: 1.2rem; width: 45px; height: 45px; }

/* GAME OVER / LEADERBOARD */
.leaderboard { margin: 1em 0; text-align: left; }
.lb-entry { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid rgba(212,160,84,0.1); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; }
.lb-entry.you { color: #d4a054; background: rgba(212,160,84,0.08); }
.lb-rank { color: #8a7560; width: 30px; }
.lb-name { flex: 1; }
.lb-score { color: #d4a054; }

/* PAUSE */
.pause-overlay { position: fixed; inset: 0; background: rgba(13,10,7,0.9); z-index: 90; display: none; align-items: center; justify-content: center; flex-direction: column; }
.pause-overlay.active { display: flex; }

/* LORE POPUP */
.lore-popup { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 1px solid rgba(212,160,84,0.4); padding: 15px 25px; z-index: 60; max-width: 350px; display: none; pointer-events: none; }
.lore-popup.active { display: block; }
.lore-title { font-family: 'Share Tech Mono', monospace; color: #d4a054; font-size: 0.8rem; margin-bottom: 5px; }
.lore-text { color: #8a7560; font-size: 0.75rem; line-height: 1.5; }

.scroll-area { max-height: 70vh; overflow-y: auto; padding-right: 5px; }
.scroll-area::-webkit-scrollbar { width: 4px; }
.scroll-area::-webkit-scrollbar-thumb { background: rgba(212,160,84,0.3); }
</style>
</head>
<body>

<!-- DAMAGE FLASH -->
<div class="damage-flash" id="damageFlash"></div>

<!-- MAIN MENU -->
<div class="screen active" id="menuScreen">
  <div class="screen-bg"></div>
  <div class="screen-content">
    <div class="title">WW III</div>
    <div class="subtitle">Reclaim Your Territory</div>
    <button class="btn" onclick="showScreen('charScreen')">New Game</button>
    <button class="btn" onclick="showScreen('leaderboardScreen')">Leaderboard</button>
    <button class="btn" onclick="showScreen('loreScreen')">Collected Lore</button>
  </div>
</div>

<!-- CHARACTER CREATOR -->
<div class="screen" id="charScreen">
  <div class="screen-bg"></div>
  <div class="screen-content scroll-area">
    <div class="section-title">Create Your Survivor</div>
    <div class="char-preview" id="charPreview">🧑</div>
    <div class="desc">Choose your look</div>
    <div class="section-title" style="font-size:1rem">Skin Tone</div>
    <div class="color-options" id="skinColors"></div>
    <div class="section-title" style="font-size:1rem">Armor Color</div>
    <div class="color-options" id="armorColors"></div>
    <div class="section-title" style="font-size:1rem">Name</div>
    <input type="text" id="playerName" placeholder="Survivor" style="background:rgba(212,160,84,0.08);border:1px solid rgba(212,160,84,0.25);color:#d4a054;padding:10px 16px;font-family:'Rajdhani',sans-serif;font-size:1rem;width:100%;text-align:center;outline:none;" maxlength="12">
    <br><br>
    <button class="btn" onclick="startGame()">Enter the Wasteland</button>
    <button class="btn" onclick="showScreen('menuScreen')" style="opacity:0.6">Back</button>
  </div>
</div>

<!-- LEVEL SELECT -->
<div class="screen" id="levelScreen">
  <div class="screen-bg"></div>
  <div class="screen-content scroll-area">
    <div class="section-title">Select Mission</div>
    <div class="levels-grid" id="levelsGrid"></div>
    <div class="section-title" style="font-size:1rem">Difficulty</div>
    <div class="diff-options">
      <button class="btn small" onclick="setDifficulty(0)" id="diff0">Easy</button>
      <button class="btn small selected" onclick="setDifficulty(1)" id="diff1">Normal</button>
      <button class="btn small" onclick="setDifficulty(2)" id="diff2">Hard</button>
    </div>
    <button class="btn" id="startLevelBtn" onclick="startLevel()">Deploy</button>
    <button class="btn" onclick="showScreen('menuScreen')" style="opacity:0.6">Back</button>
  </div>
</div>

<!-- CUTSCENE -->
<div class="screen" id="cutsceneScreen">
  <div class="screen-bg"></div>
  <div class="screen-content">
    <div class="cutscene-panel">
      <div class="cutscene-speaker" id="cutsceneSpeaker"></div>
      <div class="cutscene-text" id="cutsceneText"></div>
    </div>
    <button class="btn" id="cutsceneNext" onclick="advanceCutscene()">Continue</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div>
      <div class="health-bar">
        <div class="bar-label">HEALTH</div>
        <div class="bar-outer"><div class="bar-inner health" id="healthBar" style="width:100%"></div></div>
      </div>
      <div class="health-bar" style="margin-top:6px">
        <div class="bar-label">STAMINA</div>
        <div class="bar-outer"><div class="bar-inner" id="staminaBar" style="width:100%;background:linear-gradient(90deg,#3a6b8b,#5ca0c4)"></div></div>
      </div>
      <div class="level-display" id="levelInfo" style="margin-top:4px"></div>
    </div>
    <div>
      <div class="score-display">SCORE: <span id="scoreDisplay">0</span></div>
      <div class="score-display" style="font-size:0.7rem;color:#8a7560">SCRAP: <span id="scrapDisplay">0</span> | XP: <span id="xpDisplay">0</span></div>
    </div>
  </div>
  <div class="crosshair"></div>
  <div class="hud-bottom">
    <div class="inventory-bar" id="inventoryBar"></div>
    <div style="display:flex;gap:12px;align-items:flex-end">
      <div class="minimap" id="minimap"></div>
      <div class="ammo-display">
        <div class="ammo-count" id="ammoCount">--</div>
        <div class="ammo-label" id="ammoLabel">MELEE</div>
      </div>
    </div>
  </div>
</div>

<!-- TOUCH CONTROLS -->
<div class="joystick-area" id="joystickArea"><div class="joystick-knob" id="joystickKnob"></div></div>
<button class="touch-btn" id="btn-attack">ATK</button>
<button class="touch-btn" id="btn-block">BLK</button>
<button class="touch-btn" id="btn-dodge">DDG</button>
<button class="touch-btn" id="btn-ranged">RNG</button>
<button class="touch-btn" id="btn-weapon">⚔</button>

<!-- LORE POPUP -->
<div class="lore-popup" id="lorePopup">
  <div class="lore-title" id="lorePopTitle"></div>
  <div class="lore-text" id="lorePopText"></div>
</div>

<!-- PAUSE -->
<div class="pause-overlay" id="pauseOverlay">
  <div class="section-title">Paused</div>
  <br>
  <button class="btn" style="width:250px" onclick="togglePause()">Resume</button>
  <button class="btn" style="width:250px" onclick="quitToMenu()">Quit to Menu</button>
</div>

<!-- GAME OVER -->
<div class="screen" id="gameoverScreen">
  <div class="screen-bg"></div>
  <div class="screen-content">
    <div class="title" style="font-size:2.5rem;color:#8b3a3a">FALLEN</div>
    <div class="desc" id="goStats"></div>
    <div class="section-title" style="font-size:1rem">Final Score: <span id="goScore">0</span></div>
    <button class="btn" onclick="showScreen('menuScreen')">Return to Menu</button>
  </div>
</div>

<!-- VICTORY -->
<div class="screen" id="victoryScreen">
  <div class="screen-bg"></div>
  <div class="screen-content">
    <div class="title" style="font-size:2rem;color:#5cc46c">TERRITORY RECLAIMED</div>
    <div class="desc" id="vicStats"></div>
    <div id="weaponUnlock" style="margin:12px 0;padding:14px;border:1px solid rgba(92,196,108,0.4);background:rgba(92,196,108,0.08);display:none">
      <div style="font-family:'Share Tech Mono',monospace;color:#5cc46c;font-size:0.8rem;letter-spacing:0.2em">NEW WEAPON UNLOCKED</div>
      <div id="weaponUnlockName" style="font-size:1.6rem;color:#d4a054;margin-top:4px"></div>
      <div id="weaponUnlockDesc" style="font-size:0.75rem;color:#8a7560;margin-top:2px"></div>
    </div>
    <div id="skillUpgrade" style="margin:8px 0;padding:10px;border:1px solid rgba(212,160,84,0.2);font-size:0.8rem;color:#8a7560"></div>
    <button class="btn" onclick="showScreen('levelScreen')">Next Mission</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboardScreen">
  <div class="screen-bg"></div>
  <div class="screen-content scroll-area">
    <div class="section-title">Leaderboard</div>
    <div class="leaderboard" id="leaderboardList"></div>
    <br>
    <button class="btn" onclick="showScreen('menuScreen')">Back</button>
  </div>
</div>

<!-- LORE COLLECTION -->
<div class="screen" id="loreScreen">
  <div class="screen-bg"></div>
  <div class="screen-content scroll-area">
    <div class="section-title">Collected Lore</div>
    <div id="loreList" style="text-align:left"></div>
    <br>
    <button class="btn" onclick="showScreen('menuScreen')">Back</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== GAME STATE =====
const G = {
  score: 0, scrap: 0, xp: 0, health: 100, maxHealth: 100, stamina: 100,
  ammo: { pistol: 24, shells: 0, smg: 0, rifle: 0, sniper: 0 },
  currentWeapon: 0, weapons: ['combat_knife', 'pistol'],
  difficulty: 1, currentLevel: 0, selectedLevel: 0,
  enemies: [], vehicles: [], allies: [], items: [], loreItems: [], projectiles: [],
  collectedLore: (function(){try{return JSON.parse(localStorage.getItem('ww3_lore')||'[]')}catch(e){return []}})(),
  leaderboard: (function(){try{return JSON.parse(localStorage.getItem('ww3_lb')||'[]')}catch(e){return []}})(),
  unlockedLevel: (function(){try{return parseInt(localStorage.getItem('ww3_unlocked')||'1')}catch(e){return 1}})(),
  paused: false, alive: true, inGame: false,
  playerChar: { skin: '#c4956a', armor: '#5a6b52', name: 'Survivor' },
  skills: { strength: 0, speed: 0, defense: 0 },
  moveDir: { x: 0, z: 0 }, lookDir: { x: 0, y: 0 },
  keys: {}, isTouch: false, isBoss: false,
  attackCooldown: 0, dodgeCooldown: 0, blocking: false,
  driving: null, // reference to vehicle being driven
  killStreak: 0
};

// ===== LEVEL DATA =====
const LEVELS = [
  { name: "First Contact", env: "city", enemies: 5, story: [
    "G: Greg, this is G. Comms check.",
    "GREG: Loud and clear.",
    "G: Raiders crossed the eastern border at 0400. They've overrun the outer district. You're the closest operative.",
    "GREG: Just me?",
    "G: Just you. Neutralize all hostiles. Reclaim the gate.",
    "GREG: Understood. Moving to contact."]},
  { name: "Market District", env: "city", enemies: 6, story: [
    "G: Solid work at the gates. Satellite shows hostiles fortifying the old market.",
    "GREG: Numbers?",
    "G: Six confirmed. Possibly more inside the structures. Watch the rooftops.",
    "GREG: Copy. Going loud."]},
  { name: "Dust Highway", env: "desert", enemies: 7, story: [
    "G: Intercepted raider comms. Armed convoy heading south on the old highway.",
    "GREG: Ambush point?",
    "G: Negative. Open terrain. Head-on engagement.",
    "G: Greg... these ones are organized. Someone is commanding them. This is bigger than we thought."]},
  { name: "Canyon Pass", env: "canyon", enemies: 7, story: [
    "G: The highway leads into a canyon. Narrow passage. Raiders have fortified both cliff walls.",
    "GREG: Perfect chokepoint.",
    "G: For them or for you. Use the rock cover. They'll have the high ground.",
    "GREG: I'll take it from them.",
    "G: Watch for snipers on the ridgeline."]},
  { name: "The Overpass", env: "desert", enemies: 8, boss: true, story: [
    "G: The overpass checkpoint. Heavily fortified. A lieutenant called Ironjaw runs it. Ex-military.",
    "GREG: One target.",
    "G: I'm authorizing armor support — your team's tank will be on standby.",
    "GREG: About time I got some backup.",
    "G: Take him down, Greg."]},
  { name: "Desert Airbase", env: "airbase", enemies: 8, story: [
    "G: Captured airbase thirty klicks south. Raiders are using the runways to fly in supplies and reinforcements.",
    "GREG: If I take the airbase, I cut their supply line.",
    "G: Exactly. The hangars are their main storage. Control tower has their comms equipment.",
    "GREG: I'll shut it all down.",
    "G: Be careful in the open. The runway is a killzone."]},
  { name: "Sunken Metro", env: "bunker", enemies: 8, story: [
    "G: Underground tunnel network beneath sector seven. Raiders are moving troops through the old metro.",
    "GREG: Tight quarters.",
    "G: I've been intercepting strange chatter. Something about a 'project' they're guarding.",
    "GREG: Keep me posted."]},
  { name: "The Vault", env: "bunker", enemies: 9, story: [
    "G: Pre-war military stockpile ahead. If they keep these weapons, they'll outgun our entire country.",
    "GREG: Then they don't keep them.",
    "G: The chatter I decoded... Greg, they're building something massive.",
    "GREG: How massive?",
    "G: Massive enough to end this war in one strike. Clear the vault first."]},
  { name: "Blackout Refinery", env: "refinery", enemies: 9, story: [
    "G: Intel shows the raiders seized the old refinery complex. They're using it to fuel their war machines.",
    "GREG: Oil means vehicles. Vehicles mean armor.",
    "G: Correct. Destroy their fuel reserves. Use the catwalks for elevation advantage.",
    "GREG: What about the storage tanks?",
    "G: ...Try not to blow yourself up."]},
  { name: "Ash Fields", env: "desert", enemies: 9, story: [
    "GREG: G, come in.",
    "...",
    "GREG: G, do you copy?",
    "...",
    "GREG: Comms are dead. Found G's last transmission on a dead drop. There was gunfire. Then static.",
    "GREG: G is gone. I'm on my own now.",
    "GREG: But the mission doesn't stop."]},
  { name: "Ghost Train", env: "trainyard", enemies: 10, story: [
    "GREG: An old rail junction. Derailed cars everywhere.",
    "GREG: G's notes mentioned the raiders using trains to move heavy equipment. This must be the hub.",
    "GREG: Overturned locomotive blocking the main line. They've turned this graveyard into a fortress.",
    "GREG: I'll pick them apart, car by car."]},
  { name: "Tower Block", env: "city", enemies: 10, boss: true, story: [
    "GREG: No handler. No intel. Just me and fifteen floors of hostile territory.",
    "GREG: G's last report mentioned a captain called Blackout running this sector.",
    "GREG: Tank support rolling in. Floor by floor. Let's go."]},
  { name: "The Depths", env: "bunker", enemies: 10, story: [
    "GREG: Found it. Deep underground.",
    "GREG: It's a machine. Massive. Bipedal. Military-grade armor.",
    "GREG: A war mech. Nearly operational.",
    "GREG: The commander behind this — General Kraw. Ex-coalition forces.",

// ===== PROCEDURAL TEXTURES =====
const TEX = {};
function makeTex(name, sz, fn) {
  if (TEX[name]) return TEX[name];
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const x = c.getContext('2d'); fn(x, sz);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  TEX[name] = t; return t;
}
function texBrick() {
  return makeTex('brick', 128, (x, s) => {
    x.fillStyle='#7a6a5a'; x.fillRect(0,0,s,s);
    for(let r=0;r<10;r++) { const off=(r%2)*15;
      for(let c=-1;c<6;c++) { const v=Math.random()*20-10;
        x.fillStyle=`rgb(${140+v|0},${105+v|0},${85+v|0})`; x.fillRect(off+c*26,r*13,24,11); }}
    for(let i=0;i<200;i++){x.fillStyle=`rgba(0,0,0,${Math.random()*0.08})`;x.fillRect(Math.random()*s,Math.random()*s,2,2);}
  });
}
function texConcrete() {
  return makeTex('concrete', 128, (x, s) => {
    x.fillStyle='#8a8580'; x.fillRect(0,0,s,s);
    for(let i=0;i<800;i++){const v=110+Math.random()*40;x.fillStyle=`rgb(${v|0},${v-3|0},${v-6|0})`;x.fillRect(Math.random()*s,Math.random()*s,1+Math.random()*3,1+Math.random()*3);}
    x.strokeStyle='rgba(0,0,0,0.06)';x.lineWidth=1;
    for(let i=0;i<4;i++){const p=Math.random()*s;x.beginPath();x.moveTo(p,0);x.lineTo(p+20,s);x.stroke();}
  });
}
function texMetal() {
  return makeTex('metal', 64, (x, s) => {
    x.fillStyle='#6a6a6a'; x.fillRect(0,0,s,s);
    for(let i=0;i<s;i++){const v=85+Math.random()*30;x.fillStyle=`rgb(${v|0},${v|0},${v+5|0})`;x.fillRect(0,i,s,1);}
    x.fillStyle='rgba(255,255,255,0.05)';x.fillRect(0,0,s,s/2);
    for(let i=0;i<6;i++){x.fillStyle='rgba(0,0,0,0.1)';const y=Math.random()*s;x.fillRect(0,y,s,1);}
  });
}
function texWood() {
  return makeTex('wood', 64, (x, s) => {
    x.fillStyle='#8a7560'; x.fillRect(0,0,s,s);
    for(let i=0;i<s;i++){const v=Math.sin(i*0.3)*10;x.fillStyle=`rgb(${120+v|0},${90+v|0},${65+v|0})`;x.fillRect(0,i,s,1);}
    for(let i=0;i<100;i++){x.fillStyle=`rgba(0,0,0,${Math.random()*0.06})`;x.fillRect(Math.random()*s,Math.random()*s,1,3+Math.random()*5);}
  });
}
function texFloor() {
  return makeTex('floor', 128, (x, s) => {
    x.fillStyle='#6a6560'; x.fillRect(0,0,s,s);
    const ts=32;for(let r=0;r<s/ts;r++)for(let c=0;c<s/ts;c++){
      const v=Math.random()*15-7;x.fillStyle=`rgb(${95+v|0},${88+v|0},${80+v|0})`;x.fillRect(c*ts+1,r*ts+1,ts-2,ts-2);}
    for(let i=0;i<300;i++){x.fillStyle=`rgba(0,0,0,${Math.random()*0.06})`;x.fillRect(Math.random()*s,Math.random()*s,2,2);}
  });
}
function texGround(type) {
  return makeTex('ground_'+type, 256, (x, s) => {
    const bases = {desert:[140,120,90],bunker:[80,77,72],city:[100,92,82],canyon:[150,120,80],airbase:[140,125,95],
      ocean:[40,60,75],refinery:[85,82,78],trainyard:[90,85,75],dam:[80,90,85],highway:[90,88,82]};
    const base = bases[type] || bases.city;
    x.fillStyle=`rgb(${base[0]},${base[1]},${base[2]})`; x.fillRect(0,0,s,s);
    for(let i=0;i<2000;i++){const v=Math.random()*25-12;
      x.fillStyle=`rgb(${base[0]+v|0},${base[1]+v|0},${base[2]+v|0})`;
      x.fillRect(Math.random()*s,Math.random()*s,2+Math.random()*4,2+Math.random()*4);}
    if(type==='desert'||type==='canyon'||type==='airbase'){for(let i=0;i<5;i++){x.strokeStyle='rgba(160,140,100,0.12)';x.lineWidth=8+Math.random()*12;x.beginPath();x.moveTo(0,Math.random()*s);x.quadraticCurveTo(s/2,Math.random()*s,s,Math.random()*s);x.stroke();}}
  });
}

function texMat(texFn, color, repeatX, repeatY) {
  const t = texFn(); t.repeat.set(repeatX||1, repeatY||1);
  return new THREE.MeshLambertMaterial({ map: t.clone ? (() => { const c=t.clone(); c.repeat.set(repeatX||1,repeatY||1); c.needsUpdate=true; return c; })() : t, color });
}

// ===== ENVIRONMENT GENERATION =====
function clearLevel() {
  const toRemove = [];
  scene.traverse(c => { if (c.userData.levelObj) toRemove.push(c); });
  toRemove.forEach(o => { scene.remove(o); if(o.geometry) o.geometry.dispose(); });
  G.enemies = []; G.vehicles = []; G.allies = []; G.items = []; G.loreItems = []; G.projectiles = [];
}

function createGround(color1, type) {
  const geo = new THREE.PlaneGeometry(600, 600, 30, 30);
  const positions = geo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    positions.setZ(i, (Math.random() - 0.5) * 0.5);
  }
  geo.computeVertexNormals();
  const gt = texGround(type||'city'); 
  const gClone = gt.clone(); gClone.repeat.set(36,36); gClone.needsUpdate = true;
  const mat = new THREE.MeshLambertMaterial({ map: gClone, color: color1 });
  const g = new THREE.Mesh(geo, mat);
  g.rotation.x = -PI / 2;
  g.receiveShadow = true;
  g.userData.levelObj = true;
  scene.add(g);
  return g;
}

function addBox(x, y, z, w, h, d, color, isWall = true, texType) {
  const geo = new THREE.BoxGeometry(w, h, d);
  let mat;
  if (texType === 'brick') {
    const t = texBrick().clone(); t.repeat.set(Math.max(1,w/3),Math.max(1,h/3)); t.needsUpdate=true;
    mat = new THREE.MeshLambertMaterial({ map: t, color });
  } else if (texType === 'concrete') {
    const t = texConcrete().clone(); t.repeat.set(Math.max(1,w/4),Math.max(1,h/4)); t.needsUpdate=true;
    mat = new THREE.MeshLambertMaterial({ map: t, color });
  } else if (texType === 'metal') {
    const t = texMetal().clone(); t.repeat.set(Math.max(1,w/2),Math.max(1,h/2)); t.needsUpdate=true;
    mat = new THREE.MeshLambertMaterial({ map: t, color });
  } else if (texType === 'wood') {
    const t = texWood().clone(); t.repeat.set(Math.max(1,w/2),Math.max(1,h/2)); t.needsUpdate=true;
    mat = new THREE.MeshLambertMaterial({ map: t, color });
  } else if (texType === 'floor') {
    const t = texFloor().clone(); t.repeat.set(Math.max(1,w/4),Math.max(1,d/4)); t.needsUpdate=true;
    mat = new THREE.MeshLambertMaterial({ map: t, color });
  } else {
    mat = new THREE.MeshLambertMaterial({ color });
  }
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y + h/2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.levelObj = true;
  mesh.userData.isWall = isWall;
  mesh.userData.box = { min: { x: x-w/2, z: z-d/2 }, max: { x: x+w/2, z: z+d/2 } };
  scene.add(mesh);
  return mesh;
}

// Add a walkable floor slab (player Y adjusts on it)
function addFloor(x, y, z, w, d, color, texType) {
  const m = addBox(x, y, z, w, 0.2, d, color, false, texType || 'floor');
  m.userData.isWall = false;
  m.userData.isFloor = true;
  return m;
}

// Add a staircase from bottom Y to top Y
function addStairs(scene, sx, sz, topY, bottomY, dir, stairW, maxLen) {
  const rise = topY - bottomY;
  if (rise <= 0) return;
  const stepH = 0.4;
  let steps = Math.max(3, Math.ceil(rise / stepH));
  const stepD = 0.7;
  const w = stairW || 2;
  // Clamp total length to maxLen if provided
  let totalLen = steps * stepD;
  if (maxLen && totalLen > maxLen) {
    steps = Math.floor(maxLen / stepD);
    totalLen = steps * stepD;
  }
  if (steps < 2) return;
  const actualStepH = rise / steps;
  
  for (let i = 0; i < steps; i++) {
    const sy = bottomY + i * actualStepH;
    const oz = dir === 'z' ? (i * stepD) : 0;
    const ox = dir === 'x' ? (i * stepD) : 0;
    const step = addBox(sx + ox, sy, sz + oz, dir === 'z' ? w : stepD, actualStepH, dir === 'z' ? stepD : w, 0x7a7068, false, 'concrete');
    step.userData.isWall = false;
    step.userData.isRamp = true;
    step.userData.isFloor = true;
  }
  // Railings
  if (dir === 'z') {
    addBox(sx - w/2, (topY+bottomY)/2, sz + totalLen/2, 0.06, rise + 0.8, totalLen, 0x6a6560, false, 'metal');
    addBox(sx + w/2, (topY+bottomY)/2, sz + totalLen/2, 0.06, rise + 0.8, totalLen, 0x6a6560, false, 'metal');
  } else {
    addBox(sx + totalLen/2, (topY+bottomY)/2, sz - w/2, totalLen, rise + 0.8, 0.06, 0x6a6560, false, 'metal');
    addBox(sx + totalLen/2, (topY+bottomY)/2, sz + w/2, totalLen, rise + 0.8, 0.06, 0x6a6560, false, 'metal');
  }
}

// ===== BUILDING GENERATOR WITH WORKING STAIRS =====
function createBuilding(bx, bz, w, d, h, floors, c, name) {
  const wt=0.4;
  const wallColor=name==='hospital'?0x607060:name==='skyscraper'?0x6a6a70:name==='gunshop'?0x5a6a5a:name==='pharmacy'?0x606a68:name==='foodstore'?0x6a6a5a:c.wall;
  const trimColor=name==='hospital'?0x5a7a6a:name==='skyscraper'?0x5a5a65:0x6a5a4a;
  const doorW=3.5,doorH=3;
  const frontZ=bz+d/2,backZ=bz-d/2,leftX=bx-w/2,rightX=bx+w/2;
  const sideW=(w-doorW)/2;
  const wallTex=name==='skyscraper'||name==='hospital'?'concrete':'brick';
  const floorH=h/Math.max(floors,1);
  
  // OUTER WALLS
  addBox(leftX,0,bz,wt,h,d,wallColor,true,wallTex);
  addBox(rightX,0,bz,wt,h,d,wallColor,true,wallTex);
  addBox(leftX+sideW/2+wt/2,0,frontZ,sideW,h,wt,wallColor,true,wallTex);
  addBox(rightX-sideW/2-wt/2,0,frontZ,sideW,h,wt,wallColor,true,wallTex);
  addBox(bx,doorH,frontZ,doorW,h-doorH,wt,wallColor,false,wallTex);
  addBox(leftX+sideW/2+wt/2,0,backZ,sideW,h,wt,wallColor,true,wallTex);
  addBox(rightX-sideW/2-wt/2,0,backZ,sideW,h,wt,wallColor,true,wallTex);
  addBox(bx,doorH,backZ,doorW,h-doorH,wt,wallColor,false,wallTex);
  addBox(bx,0,frontZ+0.15,doorW+0.5,doorH+0.2,0.12,trimColor,false,'metal');
  addBox(bx,0,backZ-0.15,doorW+0.5,doorH+0.2,0.12,trimColor,false,'metal');
  
  // GROUND FLOOR
  addFloor(bx,-0.02,bz,w-0.5,d-0.5,0x7a7568,'floor');
  
  // UPPER FLOORS + WORKING STAIRS (only for 2+ floor buildings)
  if (floors >= 2) {
    // Stair position: inside building, away from walls
    const stairX = rightX - Math.min(3, w/2 - 0.8); // keep away from right wall
    const stairStartZ = backZ + 1.5; // start away from back wall
    const maxStairLen = d - 3; // don't exceed building depth minus margins
    
    for(let f=1;f<floors;f++){
      const fy=f*floorH;
      addFloor(bx,fy,bz,w-1,d-1,0x7a7568,'floor');
      addStairs(scene, stairX, stairStartZ, fy, (f-1)*floorH, 'z', Math.min(2, w/2-1), maxStairLen);
    }
    // Stairs from top floor to roof
    addStairs(scene, stairX, stairStartZ, h-0.3, (floors-1)*floorH, 'z', Math.min(2, w/2-1), maxStairLen);
  }
  
  // WALKABLE ROOF with railings
  addFloor(bx,h-0.1,bz,w+0.5,d+0.5,trimColor,'concrete');
  addBox(bx,h,frontZ+0.3,w+0.5,1,0.1,0x6a6a60,false,'metal');
  addBox(bx,h,backZ-0.3,w+0.5,1,0.1,0x6a6a60,false,'metal');

// ===== ENEMY SYSTEM =====
function createEnemy(x, z, isBoss, specialType) {
  isBoss = isBoss || false; specialType = specialType || null;
  // Helper: make a box/shape, position it, add to group
  function part(geo, color, px, py, pz, basic) {
    const mat = basic ? new THREE.MeshBasicMaterial({color:color,transparent:true,opacity:0.7}) : new THREE.MeshLambertMaterial({color:color});
    const m = new THREE.Mesh(geo, mat);
    m.position.set(px, py, pz);

  }
  const group = new THREE.Group();
  const bc = isBoss?0x8b3a3a:specialType==='sniper'?0x4a5a4a:specialType==='bomber'?0x8a5a2a:specialType==='shield'?0x4a4a6a:0x6b5a42;
  const s = isBoss ? 1.8 : 1;
  // Body
  group.add(part(new THREE.BoxGeometry(0.8*s,1.2*s,0.5*s), bc, 0,1.2*s,0));
  // Head
  group.add(part(new THREE.BoxGeometry(0.5*s,0.5*s,0.5*s), specialType==='bomber'?0xaa6a3a:0xc4956a, 0,2*s,0));
  // Arms
  group.add(part(new THREE.BoxGeometry(0.25*s,0.8*s,0.25*s), bc, -0.55*s,1.2*s,0));
  group.add(part(new THREE.BoxGeometry(0.25*s,0.8*s,0.25*s), bc, 0.55*s,1.2*s,0));
  // Legs
  group.add(part(new THREE.BoxGeometry(0.3*s,0.7*s,0.3*s), 0x3a3530, -0.2*s,0.35*s,0));
  group.add(part(new THREE.BoxGeometry(0.3*s,0.7*s,0.3*s), 0x3a3530, 0.2*s,0.35*s,0));
  // Special type visuals
  if (specialType==='sniper') {
    group.add(part(new THREE.BoxGeometry(0.08,0.08,1.4), 0x2a2a2a, 0.6,1.3,-0.7));
    group.add(part(new THREE.CylinderGeometry(0.04,0.04,0.3,6), 0x1a1a1a, 0.6,1.45,-0.4));
    group.add(part(new THREE.BoxGeometry(0.6,0.3,0.6), 0x4a5a3a, 0,2.4,0));
  } else if (specialType==='bomber') {
    group.add(part(new THREE.BoxGeometry(0.85,0.6,0.3), 0x8a5a2a, 0,1.3,-0.25));
    group.add(part(new THREE.SphereGeometry(0.08,6,6), 0xff0000, 0,1.5,-0.42, true));
    group.add(part(new THREE.BoxGeometry(0.1,0.15,0.1), 0x2a2a2a, 0.55,1,-0.2));
  } else if (specialType==='shield') {
    group.add(part(new THREE.BoxGeometry(1.2,1.6,0.15), 0x5a5a6a, 0,1.2,-0.5));
    group.add(part(new THREE.BoxGeometry(0.8,0.1,0.02), 0x2a2a3a, 0,1.6,-0.58, true));
    group.add(part(new THREE.BoxGeometry(0.08,0.08,0.35), 0x2a2a2a, 0.6,1.1,-0.3));
  } else if (!isBoss) {
    group.add(part(new THREE.BoxGeometry(0.1*s,0.1*s,0.6*s), 0x2a2a2a, 0.6*s,1.2*s,-0.3*s));
  }
  if (isBoss) {
    group.add(part(new THREE.BoxGeometry(0.7*s,0.4*s,0.7*s), 0x4a1a1a, 0,2.4*s,0));
    group.add(part(new THREE.BoxGeometry(0.6*s,0.15*s,0.1), 0xff3333, 0,2.3*s,-0.35*s, true));
    group.add(part(new THREE.BoxGeometry(0.5*s,0.3*s,0.5*s), 0x5a2a1a, -0.7*s,1.9*s,0));
    group.add(part(new THREE.BoxGeometry(0.5*s,0.3*s,0.5*s), 0x5a2a1a, 0.7*s,1.9*s,0));
    group.add(part(new THREE.BoxGeometry(0.85*s,0.6*s,0.15), 0x4a2a1a, 0,1.4*s,-0.3*s));
    group.add(part(new THREE.BoxGeometry(0.15*s,0.15*s,1.2*s), 0x1a1a1a, 0.65*s,1.3*s,-0.6*s));
    // Boss label
    var lc=document.createElement('canvas');lc.width=256;lc.height=64;var lx2=lc.getContext('2d');
    lx2.fillStyle='rgba(140,30,30,0.7)';lx2.fillRect(0,8,256,48);
    lx2.fillStyle='#ff4444';lx2.font='bold 36px sans-serif';lx2.textAlign='center';lx2.fillText('BOSS',128,44);

  }
  group.position.set(x,0,z);group.userData.levelObj=true;group.userData.isEnemy=true;scene.add(group);
  var diffMult=[0.7,1,1.4][G.difficulty];

  var enemy={mesh:group,x:x,z:z,specialType:specialType,

    shieldFacing:specialType==='shield',explodeRadius:specialType==='bomber'?8:0,alerted:false,_flinchTimer:0};
  G.enemies.push(enemy);return enemy;
}
function enemyShoot(e) {
  const dx = camera.position.x - e.mesh.position.x;
  const dz = camera.position.z - e.mesh.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist < 1) return;
  
  // Slight inaccuracy so player can dodge
  const spread = e.isBoss ? 0.015 : 0.08;
  const dir = new THREE.Vector3(
    dx/dist + (Math.random()-0.5)*spread,
    (camera.position.y - (e.mesh.position.y + 1.5))/dist + (Math.random()-0.5)*spread,
    dz/dist + (Math.random()-0.5)*spread
  ).normalize();
  
  // Muzzle flash on enemy
  const flash = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 4, 4),
    new THREE.MeshBasicMaterial({ color: 0xffaa33 })
  );
  flash.position.set(e.mesh.position.x + dx/dist*0.8, e.mesh.position.y + 1.4, e.mesh.position.z + dz/dist*0.8);
  flash.userData.levelObj = true;
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 60);
  
  // Bullet
  const geo = new THREE.SphereGeometry(0.06, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffcc44 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(e.mesh.position.x, e.mesh.position.y + 1.4, e.mesh.position.z);
  mesh.userData.levelObj = true;
  scene.add(mesh);
  
  // Tracer trail
  createTracer(mesh.position.clone(), dir.clone(), 0xffaa33);
  
  G.projectiles.push({ mesh, dir, speed: 35, damage: e.fireDmg, life: 2.5, fromEnemy: true });
}

    group.add(hatch);
  } else {
    // Jeep body
    const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 4), new THREE.MeshLambertMaterial({ color: 0x5a6450 }));

    group.add(chassis);
    // Hood
    const hood = new THREE.Mesh(new THREE.BoxGeometry(2, 0.3, 1.5), new THREE.MeshLambertMaterial({ color: 0x4a5a40 }));

    group.add(cabin);
    // Windshield
    const windshield = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.7), new THREE.MeshLambertMaterial({ color: 0x5588aa, side: THREE.DoubleSide, transparent: true, opacity: 0.5 }));
    windshield.position.set(0, 1.6, -0.35);
    windshield.rotation.x = -0.2;
    group.add(windshield);
    // Wheels
    [[-0.9,-1.3],[0.9,-1.3],[-0.9,1.3],[0.9,1.3]].forEach(([wx,wz]) => {
      const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.3, 8), new THREE.MeshLambertMaterial({ color: 0x1a1a1a }));
      wheel.rotation.z = Math.PI/2;
      wheel.position.set(wx, 0.4, wz);
      group.add(wheel);
    });
    // Mounted gun on top
    const gunMount = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.5, 6), new THREE.MeshLambertMaterial({ color: 0x2a2a2a }));

}

function damageVehicle(v, dmg) {
  v.health -= dmg;
  v.mesh.children.forEach(c => { if(c.material) c.material.emissive = new THREE.Color(0x5a1a1a); });
  setTimeout(() => { v.mesh.children.forEach(c => { if(c.material) c.material.emissive = new THREE.Color(0); }); }, 100);
  if (v.health <= 0) killVehicle(v);
}

function killVehicle(v) {
  // Explosion effect — replace with burning wreck
  v.mesh.children.forEach(c => { if(c.material) c.material.color.set(0x1a1a1a); });
  // Smoke particles
  for (let i = 0; i < 5; i++) {
    const smoke = new THREE.Mesh(
      new THREE.SphereGeometry(0.5 + Math.random(), 4, 4),
      new THREE.MeshBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.6 })
    );
    smoke.position.set(
      v.mesh.position.x + (Math.random()-0.5)*2,
      2 + Math.random()*2,
      v.mesh.position.z + (Math.random()-0.5)*2
    );
    smoke.userData.levelObj = true;
    scene.add(smoke);
  }
  
  G.score += v.type === 'tank' ? 800 : 400;
  G.scrap += v.type === 'tank' ? 50 : 25;
  G.xp += v.type === 'tank' ? 80 : 40;
  
  // Drop good loot
  spawnItem(v.mesh.position.x, v.mesh.position.z, 'bullets');
  if (Math.random() > 0.3) spawnItem(v.mesh.position.x + 1, v.mesh.position.z, 'medkit');
  
  checkLevelComplete();
  updateHUD();
}

function vehicleShoot(v) {
  const dx = camera.position.x - v.mesh.position.x;
  const dz = camera.position.z - v.mesh.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist < 1) return;
  
  const spread = v.type === 'tank' ? 0.02 : 0.06;
  const dir = new THREE.Vector3(
    dx/dist + (Math.random()-0.5)*spread,
    0.05,
    dz/dist + (Math.random()-0.5)*spread
  ).normalize();
  
  // Muzzle flash
  const flash = new THREE.Mesh(
    new THREE.SphereGeometry(v.type === 'tank' ? 0.4 : 0.15, 4, 4),
    new THREE.MeshBasicMaterial({ color: v.type === 'tank' ? 0xff4400 : 0xffaa00 })
  );
  const fy = v.type === 'tank' ? 2.5 : 2.2;
  flash.position.set(v.mesh.position.x + dx/dist*2, fy, v.mesh.position.z + dz/dist*2);
  flash.userData.levelObj = true;
  scene.add(flash);
  setTimeout(() => scene.remove(flash), 70);
  
  const bulletColor = v.type === 'tank' ? 0xff6600 : 0xffaa00;
  const geo = new THREE.SphereGeometry(v.type === 'tank' ? 0.2 : 0.08, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: bulletColor });
  const mesh = new THREE.Mesh(geo, mat);
  const origin = new THREE.Vector3(v.mesh.position.x, fy, v.mesh.position.z);
  mesh.position.copy(origin);
  mesh.userData.levelObj = true;
  scene.add(mesh);
  
  createTracer(origin.clone(), dir.clone(), bulletColor);
  
  G.projectiles.push({ mesh, dir, speed: v.type === 'tank' ? 30 : 45, damage: v.damage, life: 3, fromEnemy: true });
}

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(2,0.8,1.8), new THREE.MeshLambertMaterial({ color: 0x4a6a5a }));
    cabin.position.set(0, 1.5, 0.5); group.add(cabin);
    [[-0.9,-1.3],[0.9,-1.3],[-0.9,1.3],[0.9,1.3]].forEach(([wx,wz]) => {
      const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.3,8), new THREE.MeshLambertMaterial({ color: 0x1a1a1a }));
      wheel.rotation.z = Math.PI/2; wheel.position.set(wx, 0.4, wz); group.add(wheel);
    });
    const gun = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,1.5,6), new THREE.MeshLambertMaterial({ color: 0x2a3a2a }));
    gun.rotation.x = Math.PI/2; gun.position.set(0, 2.2, -0.6); group.add(gun);
  }
  
  // YOUR TEAM floating label
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 256; labelCanvas.height = 64;
  const ctx = labelCanvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(8, 8, 240, 48); ctx.fill();
  ctx.fillStyle = '#44ddaa'; ctx.font = 'bold 28px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('YOUR TEAM', 128, 42);
  const labelTex = new THREE.CanvasTexture(labelCanvas);
  const label = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.75), new THREE.MeshBasicMaterial({ map: labelTex, transparent: true, depthTest: false, side: THREE.DoubleSide }));
  label.position.y = type === 'tank' ? 4.5 : 3.5;
  group.add(label);
  
  // Blue-green glow ring on ground
  const ring = new THREE.Mesh(new THREE.RingGeometry(2.5, 2.8, 16), new THREE.MeshBasicMaterial({ color: 0x44ddaa, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI/2; ring.position.y = 0.05;
  group.add(ring);
  
  group.position.set(x, 0, z);
  group.userData.levelObj = true;
  scene.add(group);
  
  const ally = {
    mesh: group, type, x, z,
    health: type === 'tank' ? 250 : 100,
    maxHealth: type === 'tank' ? 250 : 100,
    speed: type === 'tank' ? 3.5 : 7,
    damage: type === 'tank' ? 25 : 12,
    fireRate: type === 'tank' ? 2 : 1,
    fireCd: 0,
    range: type === 'tank' ? 50 : 35,
    targetEnemy: null,
    patrolAngle: Math.random() * Math.PI * 2
  };
  G.allies.push(ally);
  return ally;
}

function allyShoot(ally, target) {
  const tx = target.mesh.position.x, tz = target.mesh.position.z;
  const ax = ally.mesh.position.x, az = ally.mesh.position.z;
  const dx = tx - ax, dz = tz - az;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist < 1) return;
  
  const spread = 0.05;
  const dir = new THREE.Vector3(dx/dist + (Math.random()-0.5)*spread, 0.02, dz/dist + (Math.random()-0.5)*spread).normalize();
  
  // Muzzle flash
  const fy = ally.type === 'tank' ? 2.5 : 2.2;
  const flash = new THREE.Mesh(new THREE.SphereGeometry(ally.type === 'tank' ? 0.3 : 0.12, 4, 4), new THREE.MeshBasicMaterial({ color: 0x44ddaa }));
  flash.position.set(ax + dx/dist*2, fy, az + dz/dist*2);
  flash.userData.levelObj = true; scene.add(flash);
  setTimeout(() => scene.remove(flash), 60);
  
  // Tracer (green-blue for ally)
  const origin = new THREE.Vector3(ax, fy, az);
  createTracer(origin.clone(), dir.clone(), 0x44ddaa);
  
  // Bullet
  const bulletMesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), new THREE.MeshBasicMaterial({ color: 0x44ddaa }));
  bulletMesh.position.copy(origin);
  bulletMesh.userData.levelObj = true; scene.add(bulletMesh);
  
  G.projectiles.push({ mesh: bulletMesh, dir, speed: 40, damage: ally.damage, life: 2.5, fromAlly: true });
}

// ===== ITEMS =====
function spawnItem(x, z, type) {
  const colors = { food: 0x5cc46c, water: 0x5ca0c4, scrap: 0xd4a054, medkit: 0xff4444, bullets: 0xc4956a, ammo: 0xc4956a };
  let geo, mat, mesh;
  if (type === 'medkit') {
    // Red cross box
    const group = new THREE.Group();
    const box = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.35, 0.35), new THREE.MeshLambertMaterial({ color: 0x999999 }));
    const cross1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.06, 0.06), new THREE.MeshLambertMaterial({ color: 0xff2222 }));
    const cross2 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.3, 0.06), new THREE.MeshLambertMaterial({ color: 0xff2222 }));
    cross1.position.z = 0.18; cross2.position.z = 0.18;
    group.add(box); group.add(cross1); group.add(cross2);
    group.position.set(x, 0.5, z);
    group.userData.levelObj = true;
    scene.add(group);
    mesh = group;
  } else if (type === 'bullets') {
    // Ammo crate
    const group = new THREE.Group();
    const crate = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.35), new THREE.MeshLambertMaterial({ color: 0x4a5a3a }));
    const lid = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.04, 0.37), new THREE.MeshLambertMaterial({ color: 0x3a4a2a }));
    lid.position.y = 0.17;
    group.add(crate); group.add(lid);
    group.position.set(x, 0.5, z);
    group.userData.levelObj = true;
    scene.add(group);
    mesh = group;
  } else {
    geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
    mat = new THREE.MeshLambertMaterial({ color: colors[type] || 0xd4a054 });
    mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0.5, z);
    mesh.userData.levelObj = true;
    scene.add(mesh);
  }
  G.items.push({ mesh, x, z, type, collected: false });
}

function spawnLore(x, z, index) {
  const geo = new THREE.OctahedronGeometry(0.3, 0);
  const mat = new THREE.MeshLambertMaterial({ color: 0xd4a054, emissive: 0x5a3a10 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 1, z);
  mesh.userData.levelObj = true;
  scene.add(mesh);
  G.loreItems.push({ mesh, x, z, index, collected: false });
}

// ===== UI HELPERS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  if (id === 'levelScreen') populateLevels();
  if (id === 'leaderboardScreen') showLeaderboard();
  if (id === 'loreScreen') showLoreCollection();
}

const skinTones = ['#f5d0a9','#c4956a','#8d5524','#6b3a1f','#3b1f0e'];
const armorTones = ['#5a6b52','#4a5a6b','#6b5a4a','#5a4a5a','#3a3a3a','#8b6b3a'];

function initCharCreator() {
  const sc = document.getElementById('skinColors');
  const ac = document.getElementById('armorColors');
  sc.innerHTML = '';
  ac.innerHTML = '';
  skinTones.forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'color-opt' + (c === G.playerChar.skin ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => { G.playerChar.skin = c; initCharCreator(); };
    sc.appendChild(d);
  });
  armorTones.forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'color-opt' + (c === G.playerChar.armor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => { G.playerChar.armor = c; initCharCreator(); };
    ac.appendChild(d);
  });
}

function populateLevels() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const card = document.createElement('div');
    const locked = i + 1 > G.unlockedLevel;
    card.className = 'level-card' + (locked ? ' locked' : '') + (i === G.selectedLevel ? ' selected' : '');
    card.style.borderColor = i === G.selectedLevel ? '#d4a054' : '';
    card.innerHTML = `<div class="lnum">${String(i+1).padStart(2,'0')}</div><div class="lname">${locked ? '???' : lv.name}</div>`;
    if (!locked) card.onclick = () => { G.selectedLevel = i; populateLevels(); };
    grid.appendChild(card);
  });
}

function setDifficulty(d) {
  G.difficulty = d;
  [0,1,2].forEach(i => document.getElementById('diff'+i).classList.toggle('selected', i === d));
}

function showLeaderboard() {
  const list = document.getElementById('leaderboardList');
  const sorted = [...G.leaderboard].sort((a,b) => b.score - a.score).slice(0, 10);
  if (sorted.length === 0) {
    list.innerHTML = '<div class="desc">No entries yet. Survive to earn your place.</div>';
    return;
  }
  list.innerHTML = sorted.map((e, i) => 
    `<div class="lb-entry"><span class="lb-rank">#${i+1}</span><span class="lb-name">${e.name}</span><span class="lb-score">${e.score}</span></div>`
  ).join('');
}

function showLoreCollection() {
  const list = document.getElementById('loreList');
  if (G.collectedLore.length === 0) {
    list.innerHTML = '<div class="desc">No lore found yet. Explore the wasteland.</div>';
    return;
  }
  list.innerHTML = G.collectedLore.map(idx => {
    const l = LORE_ENTRIES[idx];
    return `<div style="margin:12px 0;padding:12px;border:1px solid rgba(212,160,84,0.15)"><div class="lore-title">${l.title}</div><div class="lore-text">${l.text}</div></div>`;
  }).join('');
}

// ===== GAME FLOW =====
function startGame() {
  G.playerChar.name = document.getElementById('playerName').value || 'Survivor';
  G.score = 0; G.scrap = 0; G.xp = 0;
  G.health = 100; G.stamina = 100;
  G.weapons = ['combat_knife', 'pistol'];
  G.ammo = { pistol: 24, shells: 0, smg: 0, rifle: 0, sniper: 0 };
  G.currentWeapon = 0;
  G.alive = true;
  G.selectedLevel = 0;
  showScreen('levelScreen');
}

function startLevel() {
  const lv = LEVELS[G.selectedLevel];
  G.currentLevel = G.selectedLevel;
  // Show cutscene
  G.cutsceneLines = [...lv.story];
  G.cutsceneIdx = 0;
  showScreen('cutsceneScreen');
  showCutsceneLine();
}

function showCutsceneLine() {
  if (G.cutsceneIdx >= G.cutsceneLines.length) {
    launchLevel();
    return;
  }
  const line = G.cutsceneLines[G.cutsceneIdx];
  const colonIdx = line.indexOf(': ');
  const speaker = colonIdx > 0 ? line.slice(0, colonIdx) : '';
  const text = colonIdx > 0 ? line.slice(colonIdx + 2) : line;
  const speakerEl = document.getElementById('cutsceneSpeaker');
  const textEl = document.getElementById('cutsceneText');
  speakerEl.textContent = speaker;
  textEl.textContent = text;
  // Color code speakers
  if (speaker === 'GREG') speakerEl.style.color = '#5cc46c';
  else if (speaker === 'G') speakerEl.style.color = '#d4a054';
  else speakerEl.style.color = '#8a7560';
  // Silence effect
  if (line === '...') { speakerEl.textContent = ''; textEl.textContent = '· · ·'; textEl.style.opacity = '0.4'; }
  else { textEl.style.opacity = '1'; }
  document.getElementById('cutsceneNext').textContent = G.cutsceneIdx >= G.cutsceneLines.length - 1 ? 'Begin Mission' : 'Continue';
}

function advanceCutscene() {
  G.cutsceneIdx++;
  showCutsceneLine();
}

function launchLevel() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('hud').classList.add('active');
  
  const lv = LEVELS[G.currentLevel];
  generateEnvironment(lv.env);
  
  // Reset player
  camera.position.set(0, 1.7, 0);
  camera.rotation.set(0, 0, 0);
  G.lookDir = { x: 0, y: 0 };
  G.alive = true;
  G.inGame = true;
  G.paused = false;
  G.blocking = false;
  G.attackCooldown = 0;
  G.dodgeCooldown = 0;
  
  // Spawn enemies
  const diffMult = [1.5, 2, 3.5][G.difficulty];
  const numEnemies = Math.floor(lv.enemies * diffMult);
  for (let i = 0; i < numEnemies; i++) {
    const angle = (i / numEnemies) * PI * 2;
    const dist = 30 + Math.random() * 60;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;
    // Mix in special enemy types
    const roll = Math.random();
    if (roll < 0.12) createEnemy(x, z, false, 'sniper');
    else if (roll < 0.22) createEnemy(x, z, false, 'bomber');
    else if (roll < 0.32) createEnemy(x, z, false, 'shield');
    else createEnemy(x, z, false);
  }
  if (lv.boss) {
    createEnemy(0, -35, true);
    G.isBoss = true;
  } else {
    G.isBoss = false;
  }
  
  // Spawn vehicles based on level progression
  const vehCount = Math.min(Math.floor(G.currentLevel / 2), 4);
  for (let i = 0; i < vehCount; i++) {
    const angle = (i / Math.max(vehCount,1)) * PI * 2 + PI/4;
    const dist = 50 + Math.random() * 40;
    const vx = Math.cos(angle) * dist;
    const vz = Math.sin(angle) * dist;
    const vType = (i === 0 && G.currentLevel >= 4) ? 'tank' : 'jeep';
    createVehicle(vx, vz, vType);
  }
  
  // Spawn ally vehicle only on boss levels
  if (lv.boss) {
    const allyType = G.currentLevel >= 4 ? 'tank' : 'jeep';
    createAllyVehicle(2, 5, allyType);
  }
  
  // Spawn driveable vehicles for the player
  if (G.currentLevel >= 2) {
    spawnDriveableVehicle(8, 8, 'jeep');
    if (G.currentLevel >= 6) spawnDriveableVehicle(-10, 12, 'tank');
  }
  
  // Spawn outdoor items
  for (let i = 0; i < 4; i++) {
    const types = ['food', 'water', 'scrap', 'medkit', 'bullets'];
    spawnItem((Math.random()-0.5)*60, (Math.random()-0.5)*60, types[Math.floor(Math.random()*types.length)]);
  }
  
  // Spawn lore (1 per level)
  const loreIdx = G.currentLevel % LORE_ENTRIES.length;
  if (!G.collectedLore.includes(loreIdx)) {
    spawnLore((Math.random()-0.5)*40, (Math.random()-0.5)*40, loreIdx);
  }
  
  updateHUD();
  setupTouchControls();
  
  if (!G.isTouch) {
    renderer.domElement.requestPointerLock();
  }
}

// ===== COMBAT =====
function attack() {
  if (G.attackCooldown > 0 || !G.alive) return;
  const wp = WEAPON_DATA[G.weapons[G.currentWeapon]];
  G.attackCooldown = wp.speed;
  
  if (wp.type === 'ranged') {
    const ammoKey = wp.ammoKey;
    if ((G.ammo[ammoKey] || 0) <= 0) return;
    G.ammo[ammoKey]--;
    fireProjectile(wp);
  } else {
    meleeAttack(wp);
  }
  updateHUD();
}

function meleeAttack(wp) {
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(camera.quaternion);
  
  G.enemies.forEach(e => {
    if (e.health <= 0) return;
    const dx = e.mesh.position.x - camera.position.x;
    const dz = e.mesh.position.z - camera.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > wp.range) return;
    const toEnemy = new THREE.Vector3(dx, 0, dz).normalize();
    const dot = dir.x * toEnemy.x + dir.z * toEnemy.z;
    if (dot > 0.5) damageEnemy(e, wp.dmg + G.skills.strength * 2);
  });
  
  // Also hit vehicles in melee range
  G.vehicles.forEach(v => {
    if (v.health <= 0) return;
    const dx = v.mesh.position.x - camera.position.x;
    const dz = v.mesh.position.z - camera.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > wp.range + 1) return;
    const toV = new THREE.Vector3(dx, 0, dz).normalize();
    const dot = dir.x * toV.x + dir.z * toV.z;
    if (dot > 0.4) damageVehicle(v, (wp.dmg + G.skills.strength * 2) * 0.5); // melee does half damage to vehicles
  });
}

function fireProjectile(wp) {
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(camera.quaternion);
  
  // Muzzle flash (screen-space flash effect)
  const flash = document.getElementById('damageFlash');
  flash.style.background = 'rgba(255,200,80,0.15)';
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; flash.style.background = 'rgba(180,40,40,0.3)'; }, 50);
  
  // 3D muzzle flash in world
  const muzzle = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 4, 4),
    new THREE.MeshBasicMaterial({ color: 0xffcc44 })
  );
  const muzzlePos = camera.position.clone().add(dir.clone().multiplyScalar(1.5));
  muzzle.position.copy(muzzlePos);
  muzzle.userData.levelObj = true;
  scene.add(muzzle);
  setTimeout(() => scene.remove(muzzle), 40);
  
  // Bullet projectile
  const bulletColor = wp === WEAPON_DATA.shotgun ? 0xff6633 : wp === WEAPON_DATA.sniper ? 0x44aaff : 0xffcc44;
  const bulletSize = wp === WEAPON_DATA.sniper ? 0.08 : wp === WEAPON_DATA.shotgun ? 0.07 : 0.05;
  const bulletSpeed = wp === WEAPON_DATA.sniper ? 80 : wp === WEAPON_DATA.shotgun ? 50 : 55;
  
  const geo = new THREE.SphereGeometry(bulletSize, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: bulletColor });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(muzzlePos);
  mesh.userData.levelObj = true;
  scene.add(mesh);
  
  // Create tracer line from barrel
  createTracer(muzzlePos.clone(), dir.clone(), bulletColor);
  
  const dmg = wp.dmg + G.skills.strength * 2;
  
  // Shotgun fires spread pellets
  if (wp === WEAPON_DATA.shotgun) {
    for (let i = 0; i < 4; i++) {
      const spread = new THREE.Vector3(
        dir.x + (Math.random()-0.5)*0.15,
        dir.y + (Math.random()-0.5)*0.1,
        dir.z + (Math.random()-0.5)*0.15
      ).normalize();
      const pellet = new THREE.Mesh(new THREE.SphereGeometry(0.04, 3, 3), new THREE.MeshBasicMaterial({ color: 0xff8844 }));
      pellet.position.copy(muzzlePos);
      pellet.userData.levelObj = true;
      scene.add(pellet);
      G.projectiles.push({ mesh: pellet, dir: spread, speed: 45, damage: dmg * 0.4, life: 1 });
    }
  }
  
  G.projectiles.push({ mesh, dir: dir.clone(), speed: bulletSpeed, damage: dmg, life: 2.5 });
}

// ===== TRACER SYSTEM =====
function createTracer(origin, direction, color) {
  const len = 8;
  const end = origin.clone().add(direction.clone().multiplyScalar(len));
  const points = [origin, end];
  const geometry = new THREE.BufferGeometry().setFromPoints(points);
  const material = new THREE.LineBasicMaterial({ 
    color: color, transparent: true, opacity: 0.8, linewidth: 2
  });
  const line = new THREE.Line(geometry, material);
  line.userData.levelObj = true;
  scene.add(line);
  
  // Fade and remove
  let opacity = 0.8;
  const fade = setInterval(() => {
    opacity -= 0.15;
    material.opacity = Math.max(0, opacity);
    if (opacity <= 0) {
      clearInterval(fade);
      scene.remove(line);
      geometry.dispose();
      material.dispose();
    }
  }, 30);
}

function damageEnemy(e, dmg) {
  if (e.shieldFacing) {
    const dx = camera.position.x - e.mesh.position.x;
    const dz = camera.position.z - e.mesh.position.z;
    const attackAngle = Math.atan2(dx, dz);
    const facingDiff = Math.abs(attackAngle - e.mesh.rotation.y);
    if (facingDiff < PI * 0.4 || facingDiff > PI * 1.6) {
      dmg *= 0.1;
      const sp = new THREE.Mesh(new THREE.SphereGeometry(0.15,4,4), new THREE.MeshBasicMaterial({color:0x8888ff}));
      sp.position.copy(e.mesh.position); sp.position.y = 1.2;
      sp.userData.levelObj = true; scene.add(sp);
      setTimeout(() => scene.remove(sp), 100);
    }
  }
  e.health -= dmg;
  // Flinch
  e._flinchTimer = 0.3;
  // Stumble backward from hit
  const dx2 = e.mesh.position.x - camera.position.x;
  const dz2 = e.mesh.position.z - camera.position.z;
  const d2 = Math.sqrt(dx2*dx2+dz2*dz2);
  if (d2 > 0.5) {
    const kb = 0.3;
    const kx = e.mesh.position.x + (dx2/d2)*kb;
    const kz = e.mesh.position.z + (dz2/d2)*kb;
    if (!checkWallCollision(kx, e.mesh.position.z)) e.mesh.position.x = kx;
    if (!checkWallCollision(e.mesh.position.x, kz)) e.mesh.position.z = kz;
  }
  e.mesh.children.forEach(c => { if(c.material) c.material.emissive = new THREE.Color(0x5a1a1a); });
  setTimeout(() => { e.mesh.children.forEach(c => { if(c.material) c.material.emissive = new THREE.Color(0); }); }, 100);
  if (e.health <= 0) killEnemy(e);
}

function killEnemy(e) {
  // Remove sniper laser if exists
  if (e._laser) { scene.remove(e._laser); e._laser = null; }
  
  // Bomber explosion
  if (e.explodeRadius > 0) {
    const boom = new THREE.Mesh(new THREE.SphereGeometry(e.explodeRadius*0.5, 8, 8), new THREE.MeshBasicMaterial({color:0xff6622, transparent:true, opacity:0.7}));
    boom.position.copy(e.mesh.position); boom.position.y = 1;
    boom.userData.levelObj = true; scene.add(boom);
    setTimeout(() => { boom.scale.set(2,2,2); boom.material.opacity = 0.3; }, 100);
    setTimeout(() => scene.remove(boom), 400);
    // Scorch mark on ground
    const scorch = new THREE.Mesh(new THREE.PlaneGeometry(e.explodeRadius, e.explodeRadius), new THREE.MeshLambertMaterial({color:0x1a1a1a,transparent:true,opacity:0.6,side:THREE.DoubleSide}));
    scorch.rotation.x = -PI/2; scorch.position.set(e.mesh.position.x, 0.05, e.mesh.position.z);
    scorch.userData.levelObj = true; scene.add(scorch);
    // Damage in radius
    const edx = camera.position.x - e.mesh.position.x;
    const edz = camera.position.z - e.mesh.position.z;
    const edist = Math.sqrt(edx*edx + edz*edz);
    if (edist < e.explodeRadius) playerTakeDamage(e.damage * (1 - edist/e.explodeRadius));
    G.enemies.forEach(other => {
      if (other === e || other.health <= 0) return;
      const ox = other.mesh.position.x-e.mesh.position.x, oz = other.mesh.position.z-e.mesh.position.z;
      if (ox*ox+oz*oz < e.explodeRadius*e.explodeRadius) { other.health -= 20; if (other.health<=0) killEnemy(other); }
    });
    camera.position.x += (Math.random()-0.5)*0.8;
    camera.position.z += (Math.random()-0.5)*0.8;
  }
  
  // === RAGDOLL DEATH — body flies back and stays ===
  const deathPos = e.mesh.position.clone();
  const fromPlayer = new THREE.Vector3(
    e.mesh.position.x - camera.position.x, 0,
    e.mesh.position.z - camera.position.z
  ).normalize();
  
  // Detach from enemies array tracking but keep mesh
  e.mesh.userData.isEnemy = false;
  
  // Ragdoll: tilt body and launch backward
  const ragSpeed = e.explodeRadius > 0 ? 8 : 3;
  let ragTimer = 0;
  const ragdoll = () => {
    ragTimer += 0.016;
    if (ragTimer > 0.5 || !e.mesh.parent) return; // stop if removed from scene
    e.mesh.position.x += fromPlayer.x * ragSpeed * 0.016;
    e.mesh.position.z += fromPlayer.z * ragSpeed * 0.016;
    e.mesh.position.y = Math.max(0, e.mesh.position.y - ragTimer * 3);
    e.mesh.rotation.x += 0.15;
    e.mesh.rotation.z += (Math.random()-0.5)*0.1;
    requestAnimationFrame(ragdoll);
  };
  ragdoll();
  
  // After ragdoll settles, lay flat as permanent body
  setTimeout(() => {
    if (!e.mesh.parent) return; // level was cleared
    e.mesh.position.y = 0;
    e.mesh.rotation.x = PI/2;
    e.mesh.rotation.z = (Math.random()-0.5)*0.3;
    e.mesh.children.forEach(c => { if(c.material) { c.material.color.multiplyScalar(0.5); c.material.emissive = new THREE.Color(0); }});
  }, 600);
  
  // Score
  const pts = e.isBoss ? 2000 : e.specialType ? 200 : 100;
  G.score += pts;
  G.scrap += e.isBoss ? 100 : 10;
  G.xp += e.isBoss ? 150 : 15;
  G.killStreak++;
  
  if (G.killStreak % 5 === 0) {
    showLorePopup('SUPPLY DROP', 'Killstreak x' + G.killStreak + '! Ammo & health incoming!');
    G.health = Math.min(G.maxHealth, G.health + 30);
    Object.keys(G.ammo).forEach(k => G.ammo[k] += 10);
  }
  
  if (Math.random() < 0.4) {
    const types = ['food', 'scrap', 'bullets', 'medkit'];
    spawnItem(deathPos.x, deathPos.z, types[Math.floor(Math.random()*types.length)]);
  }
  checkLevelComplete();
  updateHUD();
}

function playerTakeDamage(dmg) {
  if (G.blocking) dmg *= 0.3;
  if (G.driving) dmg *= 0.5; // vehicle armor
  dmg -= G.skills.defense;
  dmg = Math.max(1, dmg);
  G.health -= dmg;
  
  // Screen shake on hit
  camera.position.x += (Math.random()-0.5)*0.15;
  camera.position.z += (Math.random()-0.5)*0.15;
  
  const flash = document.getElementById('damageFlash');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 150);
  
  if (G.health <= 0) {
    G.health = 0;
    G.alive = false;
    G.driving = null;
    G.killStreak = 0;
    // Third-person death camera — pull camera back and look at player position
    const deathPos = camera.position.clone();
    const lookDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    let deathTimer = 0;
    const deathAnim = () => {
      deathTimer += 0.016;
      if (deathTimer > 2 || !G.inGame) { gameOver(); return; }
      camera.position.x -= lookDir.x * 0.08;
      camera.position.z -= lookDir.z * 0.08;
      camera.position.y = Math.max(0.5, camera.position.y - deathTimer * 0.5);
      camera.lookAt(deathPos.x, 0.5, deathPos.z);
      flash.style.background = 'rgba(120,20,20,0.5)';
      flash.style.opacity = String(Math.min(0.8, deathTimer * 0.4));
      if (renderer) renderer.render(scene, camera);
      requestAnimationFrame(deathAnim);
    };
    deathAnim();
    return;
  }
  updateHUD();
}

function dodge() {
  if (G.dodgeCooldown > 0 || G.stamina < 20 || G.driving) return;
  G.dodgeCooldown = 0.8;
  G.stamina -= 20;
  const dir = new THREE.Vector3(G.moveDir.x, 0, G.moveDir.z);
  if (dir.length() === 0) dir.z = -1;
  dir.normalize();
  dir.applyAxisAngle(new THREE.Vector3(0,1,0), G.lookDir.y);
  camera.position.x += dir.x * 4;
  camera.position.z += dir.z * 4;
  clampPosition();
}

// ===== DRIVEABLE VEHICLES =====
function toggleVehicle() {
  if (G.driving) {
    // EXIT vehicle
    G.driving = null;
    showLorePopup('VEHICLE', 'Exited vehicle');
    return;
  }
  // Find nearest driveable vehicle (abandoned enemy vehicles or ally vehicles)
  let best = null, bestDist = 8; // must be within 8 units
  // Check enemy vehicles that are destroyed (wreck = driveable!)
  G.vehicles.forEach(v => {
    if (v.health > 0) return; // can't steal live enemy vehicles
    const dx = v.mesh.position.x - camera.position.x;
    const dz = v.mesh.position.z - camera.position.z;
    const d = Math.sqrt(dx*dx + dz*dz);
    if (d < bestDist) { bestDist = d; best = { mesh: v.mesh, type: v.type, source: 'wreck' }; }
  });
  // Check spawned driveable vehicles
  scene.traverse(obj => {
    if (!obj.userData.isDriveable) return;
    const dx = obj.position.x - camera.position.x;
    const dz = obj.position.z - camera.position.z;
    const d = Math.sqrt(dx*dx + dz*dz);
    if (d < bestDist) { bestDist = d; best = { mesh: obj, type: obj.userData.vehType || 'jeep', source: 'spawned' }; }
  });
  // Check ally vehicles
  G.allies.forEach(a => {
    if (a.health <= 0) return;
    const dx = a.mesh.position.x - camera.position.x;
    const dz = a.mesh.position.z - camera.position.z;
    const d = Math.sqrt(dx*dx + dz*dz);
    if (d < bestDist) { bestDist = d; best = { mesh: a.mesh, type: a.type, source: 'ally', ref: a }; }
  });
  if (best) {
    G.driving = best;
    showLorePopup('VEHICLE', 'Driving ' + best.type.toUpperCase() + '! WASD to drive, click to shoot. E to exit.');
  }
}

function spawnDriveableVehicle(x, z, type) {
  const group = new THREE.Group();
  // Helper to make a part and position it
  function vp(geo, color, px, py, pz) {
    const m = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color:color}));
    m.position.set(px, py, pz);
    return m;
  }
  if (type === 'jeep') {
    group.add(vp(new THREE.BoxGeometry(2.2,0.6,4), 0x5a6a50, 0,0.8,0));
    group.add(vp(new THREE.BoxGeometry(2,0.3,1.5), 0x4a5a40, 0,1.15,-1));
    group.add(vp(new THREE.BoxGeometry(2,0.8,1.8), 0x4a5a40, 0,1.5,0.5));
    [[-0.9,-1.3],[0.9,-1.3],[-0.9,1.3],[0.9,1.3]].forEach(function(ww){
      var w=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.3,8),new THREE.MeshLambertMaterial({color:0x1a1a1a}));
      w.rotation.z=PI/2;w.position.set(ww[0],0.4,ww[1]);group.add(w);});
  } else {
    group.add(vp(new THREE.BoxGeometry(3.5,1.2,5), 0x5a6a50, 0,1,0));
    group.add(vp(new THREE.BoxGeometry(1.6,0.7,2), 0x4a5a40, 0,2.5,0));
    var b=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.15,3.5,6),new THREE.MeshLambertMaterial({color:0x2a2a2a}));
    b.rotation.x=PI/2;b.position.set(0,2.5,-2.8);group.add(b);
  }
  var lc=document.createElement('canvas');lc.width=256;lc.height=48;var lx=lc.getContext('2d');
  lx.fillStyle='rgba(60,100,60,0.6)';lx.fillRect(0,4,256,40);
  lx.fillStyle='#88ff88';lx.font='bold 24px sans-serif';lx.textAlign='center';lx.fillText('PRESS E TO DRIVE',128,34);
  var label=new THREE.Mesh(new THREE.PlaneGeometry(2.5,0.5),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(lc),transparent:true,depthTest:false,side:THREE.DoubleSide}));
  label.position.y = type==='tank'?4:3;
  group.add(label);
  group.position.set(x,0,z);
  group.userData.levelObj=true;group.userData.isDriveable=true;group.userData.vehType=type;
  scene.add(group);
  return group;
}

// ===== ITEM COLLECTION =====
function checkItems() {
  G.items.forEach(item => {
    if (item.collected) return;
    const dx = item.mesh.position.x - camera.position.x;
    const dz = item.mesh.position.z - camera.position.z;
    if (dx*dx + dz*dz < 4) {
      item.collected = true;
      scene.remove(item.mesh);
      switch(item.type) {
        case 'food': G.health = Math.min(G.maxHealth, G.health + 15); break;
        case 'water': G.stamina = Math.min(100, G.stamina + 30); break;
        case 'scrap': G.scrap += 15; break;
        case 'medkit': G.health = Math.min(G.maxHealth, G.health + 40); break;
        case 'bullets':
          // Give ammo for all owned guns
          if (G.weapons.includes('pistol')) G.ammo.pistol += 12;
          if (G.weapons.includes('shotgun')) G.ammo.shells += 6;
          if (G.weapons.includes('smg')) G.ammo.smg += 30;
          if (G.weapons.includes('rifle')) G.ammo.rifle += 10;
          if (G.weapons.includes('sniper')) G.ammo.sniper += 5;
          break;
        case 'ammo':
          if (G.weapons.includes('pistol')) G.ammo.pistol += 8;
          if (G.weapons.includes('shotgun')) G.ammo.shells += 4;
          if (G.weapons.includes('smg')) G.ammo.smg += 20;
          if (G.weapons.includes('rifle')) G.ammo.rifle += 6;
          if (G.weapons.includes('sniper')) G.ammo.sniper += 3;
          break;
      }
      const pickupNames = { food: '+15 Health (Food)', water: '+30 Stamina', scrap: '+15 Scrap', medkit: '+40 Health (Med Kit)', bullets: 'Ammo Resupply!' };
      showLorePopup('PICKED UP', pickupNames[item.type] || item.type);
      updateHUD();
    }
  });
  
  G.loreItems.forEach(item => {
    if (item.collected) return;
    const dx = item.mesh.position.x - camera.position.x;
    const dz = item.mesh.position.z - camera.position.z;
    if (dx*dx + dz*dz < 4) {
      item.collected = true;
      scene.remove(item.mesh);
      if (!G.collectedLore.includes(item.index)) {
        G.collectedLore.push(item.index);
        try{localStorage.setItem('ww3_lore', JSON.stringify(G.collectedLore));}catch(e){}
      }
      G.score += 200;
      const lore = LORE_ENTRIES[item.index];
      showLorePopup(lore.title, lore.text);
      updateHUD();
    }
  });
}

function showLorePopup(title, text) {
  document.getElementById('lorePopTitle').textContent = title;
  document.getElementById('lorePopText').textContent = text;
  document.getElementById('lorePopup').classList.add('active');
  setTimeout(() => document.getElementById('lorePopup').classList.remove('active'), 4000);
}

// ===== LEVEL COMPLETE =====
function checkLevelComplete() {
  const aliveEnemies = G.enemies.filter(e => e.health > 0);
  const aliveVehicles = G.vehicles.filter(v => v.health > 0);
  if (aliveEnemies.length === 0 && aliveVehicles.length === 0) {
    setTimeout(() => levelComplete(), 1000);
  }
}

function levelComplete() {
  G.inGame = false;
  document.getElementById('hud').classList.remove('active');
  hideTouchControls();
  document.exitPointerLock && document.exitPointerLock();
  
  // Unlock next level
  if (G.currentLevel + 2 > G.unlockedLevel) {
    G.unlockedLevel = G.currentLevel + 2;
    try{localStorage.setItem('ww3_unlocked', G.unlockedLevel);}catch(e){}
  }
  
  // Reward weapon unlocks — every level gives something new
  const UNLOCK_TABLE = [
    { weapon: 'bowie_knife', ammo: null, desc: 'Faster, harder-hitting blade' },
    { weapon: 'shotgun', ammo: { shells: 16 }, desc: 'Devastating at close range' },
    { weapon: 'smg', ammo: { smg: 60 }, desc: 'Rapid fire, spray and pray' },
    { weapon: 'machete', ammo: null, desc: 'Wide slash, high damage' },
    { weapon: 'rifle', ammo: { rifle: 24 }, desc: 'Accurate and powerful' },
    { weapon: 'katana', ammo: null, desc: 'The ultimate melee weapon' },
    { weapon: 'sniper', ammo: { sniper: 12 }, desc: 'One shot, one kill at any range' },
  ];
  
  let unlocked = null;
  const unlockIdx = Math.min(G.currentLevel, UNLOCK_TABLE.length - 1);
  // Try to unlock from current level, or find the next one not yet owned
  for (let i = 0; i < UNLOCK_TABLE.length; i++) {
    const u = UNLOCK_TABLE[(unlockIdx + i) % UNLOCK_TABLE.length];
    if (!G.weapons.includes(u.weapon)) {
      G.weapons.push(u.weapon);
      if (u.ammo) Object.keys(u.ammo).forEach(k => G.ammo[k] = (G.ammo[k] || 0) + u.ammo[k]);
      unlocked = u;
      break;
    }
  }
  
  // Also give ammo for all owned ranged weapons every level
  if (G.weapons.includes('pistol')) G.ammo.pistol += 12;
  if (G.weapons.includes('shotgun')) G.ammo.shells += 8;
  if (G.weapons.includes('smg')) G.ammo.smg += 40;
  if (G.weapons.includes('rifle')) G.ammo.rifle += 15;
  if (G.weapons.includes('sniper')) G.ammo.sniper += 6;
  
  // Show weapon unlock on victory screen
  const unlockEl = document.getElementById('weaponUnlock');
  if (unlocked) {
    unlockEl.style.display = 'block';
    document.getElementById('weaponUnlockName').textContent = WEAPON_DATA[unlocked.weapon].icon + ' ' + unlocked.weapon.replace(/_/g, ' ').toUpperCase();
    document.getElementById('weaponUnlockDesc').textContent = unlocked.desc;
  } else {
    unlockEl.style.display = 'none';
  }
  
  // Skill upgrades
  G.skills.strength += 1;
  G.skills.speed += 0.5;
  G.skills.defense += 1;
  
  document.getElementById('vicStats').textContent = `Score: ${G.score} | Scrap: +${G.scrap} | XP: +${G.xp}`;
  document.getElementById('skillUpgrade').innerHTML = `STR ${G.skills.strength} (+1) &nbsp;|&nbsp; SPD ${G.skills.speed.toFixed(1)} (+0.5) &nbsp;|&nbsp; DEF ${G.skills.defense} (+1)`;
  G.selectedLevel = Math.min(G.currentLevel + 1, LEVELS.length - 1);
  showScreen('victoryScreen');
}

function gameOver() {
  G.inGame = false;
  document.getElementById('hud').classList.remove('active');
  hideTouchControls();
  document.exitPointerLock && document.exitPointerLock();
  
  // Add to leaderboard
  G.leaderboard.push({ name: G.playerChar.name, score: G.score, level: G.currentLevel + 1 });
  G.leaderboard.sort((a,b) => b.score - a.score);
  G.leaderboard = G.leaderboard.slice(0, 20);
  try{localStorage.setItem('ww3_lb', JSON.stringify(G.leaderboard));}catch(e){}
  
  document.getElementById('goScore').textContent = G.score;
  document.getElementById('goStats').textContent = `Reached Level ${G.currentLevel + 1}: ${LEVELS[G.currentLevel].name}\nDifficulty: ${['Easy','Normal','Hard'][G.difficulty]}`;
  showScreen('gameoverScreen');
}
